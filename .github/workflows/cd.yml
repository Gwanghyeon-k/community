name: CD

# main에 merge되면 release PR title/body의 vX.Y.Z를 읽어 Git tag를 자동 생성하고 배포한다.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: '이미 ECR에 존재하는 image tag를 재배포한다. 예: v1.0.1'
        required: true
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  # GitHub repository variables에 등록한다.
  # 예: ap-northeast-2
  AWS_REGION: ${{ vars.AWS_REGION }}

  # 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

  # 예: community-backend
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

  # SSM 배포 대상 EC2 태그.
  # 예: Service=community-backend, Environment=production
  SSM_TARGET_SERVICE: ${{ vars.SSM_TARGET_SERVICE }}
  SSM_TARGET_ENVIRONMENT: ${{ vars.SSM_TARGET_ENVIRONMENT }}

  # EC2에서 .env 파일과 배포 상태를 관리할 기준 디렉터리.
  # 예: /opt/community
  DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}

jobs:
  release:
    name: Build and push release image
    runs-on: ubuntu-latest

    # release image build/push는 main push에서만 수행한다.
    if: github.event_name == 'push'

    permissions:
      contents: write
      id-token: write
      pull-requests: read

    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      image_uri: ${{ steps.metadata.outputs.image_uri }}

    steps:
      - name: Checkout main commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # main에 merge된 PR의 title/body에서 vMAJOR.MINOR.PATCH를 찾아 release image tag로 사용한다.
      # 예: PR title "release: v1.0.1" -> Git tag v1.0.1 + ECR image tag v1.0.1
      - name: Resolve image tag from merged PR
        id: version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pulls_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          pulls_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${pulls_url}")"

          release_text="$(jq -r '
            [.[] | select(.base.ref == "main" and .merged_at != null)]
            | sort_by(.number)
            | last
            | if . == null then "" else [.title, (.body // "")] | join("\n") end
          ' <<< "${pulls_json}")"

          image_tag="$(printf '%s\n' "${release_text}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [[ ! "${image_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Merged PR title or body must contain a release version like v1.0.1."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${image_tag}" >/dev/null; then
            echo "Git tag ${image_tag} already exists. Use a new release version."
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Release image tag: ${image_tag}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # release 이미지는 세 가지 태그로 push한다.
      # - v0.0.x: release/prod 배포 기준 태그
      # - sha-<commit>: 커밋과 이미지를 1:1로 추적하는 태그
      # - latest: 운영 기준으로 쓰지 않는 보조 태그
      #
      # buildcache 태그는 실행 이미지가 아니라 다음 빌드 속도를 높이는 BuildKit cache 저장소다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: |
            type=gha
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      # ECR push가 성공한 뒤 main merge commit에 Git release tag를 남긴다.
      # GITHUB_TOKEN으로 만든 tag push는 별도 workflow를 다시 트리거하지 않으므로 이 workflow 안에서 배포까지 수행한다.
      - name: Push Git release tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.image_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.version.outputs.image_tag }}"

      - name: Write image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.version.outputs.image_tag }}"

          {
            echo "IMAGE_TAG=${{ steps.version.outputs.image_tag }}"
            echo "IMAGE_URI=${image_uri}"
            echo "GIT_SHA=${GITHUB_SHA}"
            echo "ECR_REGISTRY=${ECR_REGISTRY}"
            echo "ECR_REPOSITORY=${ECR_REPOSITORY}"
            echo "AWS_REGION=${AWS_REGION}"
          } > image-metadata.env

          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata
          path: image-metadata.env
          retention-days: 14

  deploy:
    name: Deploy release image to private EC2
    runs-on: ubuntu-latest
    needs:
      - release

    # main push는 release job 결과를 배포한다.
    # workflow_dispatch에서 image_tag를 입력한 경우 release job을 건너뛰고 해당 tag를 재배포한다.
    if: always() && (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="${{ needs.release.outputs.image_tag }}"
          fi

          if [ -z "${image_tag}" ]; then
            echo "No image tag resolved."
            exit 1
          fi

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${image_tag}"

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

          echo "Deploy image: ${image_uri}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify image exists in ECR
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${{ steps.image.outputs.image_tag }}" \
            --region "${AWS_REGION}" >/dev/null

      - name: Create SSM command payload
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail

          cat > deploy.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          # GitHub Actions에서 치환되어 들어오는 배포 변수다.
          AWS_REGION="__AWS_REGION__"
          ECR_REGISTRY="__ECR_REGISTRY__"
          IMAGE_URI="__IMAGE_URI__"
          IMAGE_TAG="__IMAGE_TAG__"
          DEPLOY_DIR="__DEPLOY_DIR__"

          # 단순 배포용 고정 컨테이너/네트워크 이름이다.
          # 새 이미지를 pull한 뒤 기존 컨테이너를 교체한다.
          NETWORK_NAME="community-backend"
          CONTAINER_NAME="community-backend"

          mkdir -p "${DEPLOY_DIR}"
          cd "${DEPLOY_DIR}"

          # EC2가 private subnet에 있어도 ECR VPC Endpoint 또는 NAT Gateway가 있으면 pull 가능하다.
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

          docker network create "${NETWORK_NAME}" >/dev/null 2>&1 || true

          docker pull "${IMAGE_URI}"

          # 기존 컨테이너를 중지/삭제하고 새 이미지로 다시 띄운다.
          # 첫 적용용 단순 배포이므로 이 순간 짧은 downtime이 생길 수 있다.
          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

          # 애플리케이션 설정은 EC2의 ${DEPLOY_DIR}/.env에서 읽는다.
          # 이 파일에는 DB/JWT/S3 같은 secret이 들어가므로 GitHub repository에는 올리지 않는다.
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            --network "${NETWORK_NAME}" \
            --env-file "${DEPLOY_DIR}/.env" \
            -p "8080:8080" \
            -v community_backend_images:/backend/image \
            "${IMAGE_URI}"

          # 새 컨테이너가 정상 응답하는지 확인한다.
          # Spring Boot Actuator가 있으므로 /actuator/health를 기준으로 삼는다.
          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8080/actuator/health" >/dev/null; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "Health check failed for ${CONTAINER_NAME} (${IMAGE_TAG})"
              docker logs --tail 200 "${CONTAINER_NAME}" || true
              exit 1
            fi

            sleep 2
          done

          docker image prune -f >/dev/null 2>&1 || true

          echo "Deployed ${IMAGE_URI} to ${CONTAINER_NAME}"
          SCRIPT

          # GitHub hosted runner는 Ubuntu지만, 로컬 검증도 쉽게 하려고 sed -i 대신 perl을 쓴다.
          perl -0pi -e 's#__AWS_REGION__#$ENV{AWS_REGION}#g' deploy.sh
          perl -0pi -e 's#__ECR_REGISTRY__#$ENV{ECR_REGISTRY}#g' deploy.sh
          perl -0pi -e 's#__IMAGE_URI__#$ENV{IMAGE_URI}#g' deploy.sh
          perl -0pi -e 's#__IMAGE_TAG__#$ENV{IMAGE_TAG}#g' deploy.sh
          perl -0pi -e 's#__DEPLOY_DIR__#$ENV{DEPLOY_DIR}#g' deploy.sh

          jq -n --rawfile script deploy.sh '{commands: [$script]}' > ssm-parameters.json

      - name: Run deployment on tagged EC2 instances
        shell: bash
        run: |
          set -euo pipefail

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ steps.image.outputs.image_tag }} to community backend" \
            --targets \
              "Key=tag:Service,Values=${SSM_TARGET_SERVICE}" \
              "Key=tag:Environment,Values=${SSM_TARGET_ENVIRONMENT}" \
            --max-concurrency "50%" \
            --max-errors "0" \
            --parameters file://ssm-parameters.json
