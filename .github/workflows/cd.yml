name: CD

# main에 merge되면 release PR title/body의 vX.Y.Z에 해당하는 ECR image를 배포한다.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: '이미 ECR에 존재하는 image tag를 재배포한다. 예: v1.0.1'
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

  # SSM 배포 대상 EC2 태그.
  SSM_TARGET_SERVICE: ${{ vars.SSM_TARGET_SERVICE }}
  SSM_TARGET_ENVIRONMENT: ${{ vars.SSM_TARGET_ENVIRONMENT }}

  DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}

jobs:
  release-and-deploy:
    name: Deploy release image
    runs-on: ubuntu-latest

    # main push와 workflow_dispatch 모두 이미 ECR에 있는 image tag만 배포한다.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment: production

    permissions:
      contents: write
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout main commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # main에 merge된 release 라벨 PR의 title/body에서 vMAJOR.MINOR.PATCH를 찾아 release image tag로 사용한다.
      # 예: PR title "release: v1.0.1" -> Git tag v1.0.1 + ECR image tag v1.0.1
      - name: Resolve image tag from merged PR
        if: github.event_name == 'push'
        id: version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pulls_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          pulls_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${pulls_url}")"

          release_text="$(jq -r '
            [
              .[]
              | select(
                  .base.ref == "main"
                  and .merged_at != null
                  and ([.labels[].name] | index("release"))
                )
            ]
            | sort_by(.number)
            | last
            | if . == null then "" else [.title, (.body // "")] | join("\n") end
          ' <<< "${pulls_json}")"

          image_tag="$(printf '%s\n' "${release_text}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [ -z "${release_text}" ]; then
            echo "No merged release PR found for this push. Skipping deployment."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "${image_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Merged release PR title or body must contain a release version like v1.0.1."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${image_tag}" >/dev/null; then
            existing_tag_sha="$(git rev-list -n 1 "refs/tags/${image_tag}")"

            if [ "${existing_tag_sha}" != "${GITHUB_SHA}" ]; then
              echo "Git tag ${image_tag} already points to ${existing_tag_sha}. Use a new release version."
              exit 1
            fi

            echo "Git tag ${image_tag} already points to this commit. Continuing redeploy."
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "Release image tag: ${image_tag}"

      - name: Configure AWS credentials
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            image_tag="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            image_tag="${{ steps.version.outputs.image_tag }}"
          else
            image_tag=""
          fi

          if [ -z "${image_tag}" ]; then
            echo "No image tag resolved."
            exit 1
          fi

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${image_tag}"

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

          echo "Deploy image: ${image_uri}"

      - name: Verify image exists in ECR
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${{ steps.image.outputs.image_tag }}" \
            --region "${AWS_REGION}" >/dev/null

      - name: Create SSM command payload
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail

          bash -n scripts/deploy.sh

          jq -n \
            --arg aws_region "${AWS_REGION}" \
            --arg ecr_registry "${ECR_REGISTRY}" \
            --arg image_uri "${IMAGE_URI}" \
            --arg image_tag "${IMAGE_TAG}" \
            --arg deploy_dir "${DEPLOY_DIR}" \
            --rawfile script scripts/deploy.sh \
            '{
              commands: [
                "export AWS_REGION=" + ($aws_region | @sh) + "\n" +
                "export ECR_REGISTRY=" + ($ecr_registry | @sh) + "\n" +
                "export IMAGE_URI=" + ($image_uri | @sh) + "\n" +
                "export IMAGE_TAG=" + ($image_tag | @sh) + "\n" +
                "export DEPLOY_DIR=" + ($deploy_dir | @sh) + "\n" +
                $script
              ]
            }' > ssm-parameters.json

      - name: Verify SSM target instances exist
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        id: targets
        shell: bash
        run: |
          set -euo pipefail

          target_instance_ids="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters \
              "Name=tag:Service,Values=${SSM_TARGET_SERVICE}" \
              "Name=tag:Environment,Values=${SSM_TARGET_ENVIRONMENT}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)"

          if [ -z "${target_instance_ids}" ]; then
            echo "No running EC2 instances found for SSM target tags."
            echo "Required tags:"
            echo "  Service=${SSM_TARGET_SERVICE}"
            echo "  Environment=${SSM_TARGET_ENVIRONMENT}"
            exit 1
          fi

          echo "SSM target instances: ${target_instance_ids}"
          echo "instance_ids=${target_instance_ids}" >> "$GITHUB_OUTPUT"

      - name: Run deployment on tagged EC2 instances
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        id: ssm
        shell: bash
        run: |
          set -euo pipefail

          command_id="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ steps.image.outputs.image_tag }} to community backend" \
            --targets \
              "Key=tag:Service,Values=${SSM_TARGET_SERVICE}" \
              "Key=tag:Environment,Values=${SSM_TARGET_ENVIRONMENT}" \
            --max-concurrency "50%" \
            --max-errors "0" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)"

          echo "command_id=${command_id}" >> "$GITHUB_OUTPUT"
          echo "SSM command id: ${command_id}"

      - name: Wait for EC2 deployment result
        if: ${{ github.event_name == 'workflow_dispatch' || steps.version.outputs.should_deploy == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          command_id="${{ steps.ssm.outputs.command_id }}"
          instance_ids="${{ steps.targets.outputs.instance_ids }}"
          failed=0

          for instance_id in ${instance_ids}; do
            echo "Waiting for deployment on ${instance_id}"

            for attempt in $(seq 1 60); do
              status="$(aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${command_id}" \
                --instance-id "${instance_id}" \
                --query "Status" \
                --output text 2>/dev/null || true)"

              case "${status}" in
                Success|Failed|TimedOut|Cancelled|Cancelling)
                  break
                  ;;
                *)
                  sleep 5
                  ;;
              esac
            done

            stdout="$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${command_id}" \
              --instance-id "${instance_id}" \
              --query "StandardOutputContent" \
              --output text 2>/dev/null || true)"

            stderr="$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${command_id}" \
              --instance-id "${instance_id}" \
              --query "StandardErrorContent" \
              --output text 2>/dev/null || true)"

            echo "Deployment status for ${instance_id}: ${status}"
            echo "----- stdout (${instance_id}) -----"
            printf '%s\n' "${stdout}"
            echo "----- stderr (${instance_id}) -----"
            printf '%s\n' "${stderr}"

            if [ "${status}" != "Success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi

      - name: Push Git release tag
        if: github.event_name == 'push' && steps.version.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.image_tag }}" >/dev/null; then
            echo "Git tag ${{ steps.version.outputs.image_tag }} already exists. Skipping tag push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.image_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.version.outputs.image_tag }}"
