name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - edited
      - labeled
      - unlabeled
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-for-develop:
    name: Gradle test for develop PR
    runs-on: ubuntu-latest

    if: github.base_ref == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Detect Docker build file changes
        id: docker_changes
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(Dockerfile|\.dockerignore)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.docker_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image without push
        if: steps.docker_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: community-backend:develop-pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-for-main:
    name: Docker build check
    runs-on: ubuntu-latest

    # main으로 들어오는 일반 PR은 Docker image build만 검증한다.
    if: github.base_ref == 'main' && !contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: community-backend:release-pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push-for-release:
    name: Docker build and push release image
    runs-on: ubuntu-latest

    # release 라벨이 붙은 main PR만 ECR에 release image를 push한다.
    if: github.base_ref == 'main' && contains(github.event.pull_request.labels.*.name, 'release')

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      # release PR은 title 또는 body에 vX.Y.Z 버전을 명시해야 한다.
      - name: Validate release version
        id: version
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          release_text="${PR_TITLE}"$'\n'"${PR_BODY:-}"
          image_tag="$(printf '%s\n' "${release_text}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [ -z "${image_tag}" ]; then
            echo "Release PR title or body must contain a version like v1.0.1."
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${image_tag}"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve release image tag
        id: release_image
        shell: bash
        run: |
          set -euo pipefail

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.version.outputs.image_tag }}"

          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"
          echo "Release image: ${image_uri}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.release_image.outputs.image_uri }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max
