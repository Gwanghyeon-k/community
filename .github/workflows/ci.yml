name: CI

# 브랜치 전략:
# - feature/* -> develop PR: Gradle test만 수행한다.
# - develop -> main PR: develop에서 이미 test가 끝난 코드이므로 Docker image build 가능성만 검증한다.
on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-for-develop:
    name: Gradle test for develop PR
    runs-on: ubuntu-latest

    # develop으로 들어오는 PR에서 기본 테스트를 수행한다.
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

  docker-build-for-main:
    name: Docker build check
    runs-on: ubuntu-latest

    # main으로 들어오는 release PR에서는 Dockerfile과 운영 이미지 빌드 가능성만 확인한다.
    # ECR push는 main merge 후 CD에서만 수행한다.
    if: github.base_ref == 'main'

    steps:
      # release PR은 title 또는 body에 vX.Y.Z 버전을 명시해야 한다.
      # 예: release: v1.0.1
      - name: Validate release version
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          release_text="${PR_TITLE}"$'\n'"${PR_BODY:-}"
          image_tag="$(printf '%s\n' "${release_text}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [ -z "${image_tag}" ]; then
            echo "Release PR title or body must contain a version like v1.0.1."
            exit 1
          fi

          echo "Release version: ${image_tag}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Dockerfile
        run: docker build --check .

      - name: Build Docker image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: community-backend:release-pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
