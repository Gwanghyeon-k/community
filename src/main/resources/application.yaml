spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  properties:
    hibernate:
      format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${ACCESS_TOKEN_EXP}
  refresh-token-exp-seconds: ${REFRESH_TOKEN_EXP}


logging:
  level:
    org.hibernate.SQL: debug

app:
  image:
    root-dir: image
    base-url: /image
    public-base-url: http://localhost:8080
