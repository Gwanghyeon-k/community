spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  properties:
    hibernate:
      format_sql: true

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${ACCESS_TOKEN_EXP}
  refresh-token-exp-seconds: ${REFRESH_TOKEN_EXP}

app:
  image:
    root-dir: image
    base-url: /image
    public-base-url: http://43.200.6.2:8080
