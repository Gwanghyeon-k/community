spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  properties:
    hibernate:
      format_sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}


jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${ACCESS_TOKEN_EXP}
  refresh-token-exp-seconds: ${REFRESH_TOKEN_EXP}

app:
  image:
    root-dir: image
    base-url: /image
    public-base-url: http://api.amumal-community.shop:8080

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}
