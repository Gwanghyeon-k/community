server:
  forward-headers-strategy: framework

  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:20}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:5}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}

  jpa:
    hibernate:
      ddl-auto: update

  properties:
    hibernate:
      format_sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${ACCESS_TOKEN_EXP}
  refresh-token-exp-seconds: ${REFRESH_TOKEN_EXP}

app:
  image:
    root-dir: image
    base-url: /image
    public-base-url: https://api.amumal-community.shop

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics